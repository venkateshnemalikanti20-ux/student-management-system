<!DOCTYPE html>
<html>
    <head>
	    <link rel="stylesheet" href="sms.css">
	</head>
	<body>
	<div class="container">
	    <h1 class="heading">Student Management System</h1>
		<h2>Add Student</h2>
		<input type="text" id="name" placeholder="Enter Name">
		<input type="number" id="age" placeholder="Enter Age">
		<button class="add-btn" onclick="addStudent()">Add student</button>
		<button class="view-btn" onclick="viewStudent()">View students</button>
		<hr>
		<table border="1" id="studentTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>
       </thead>
          <tbody id="studentList"> </tbody>
       </table>
	   </div>
		<script src="sms.js"></script>
	</body>
</html>
